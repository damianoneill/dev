name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

      - name: lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
